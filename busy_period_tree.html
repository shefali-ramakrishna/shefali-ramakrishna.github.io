<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Busy Period Tree</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f14;
    font-family: 'Courier New', monospace;
    color: #d4cfbf;
    padding: 20px;
  }
  h2 {
    text-align: center;
    color: #c8b560;
    letter-spacing: 3px;
    font-size: 14px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .subtitle {
    text-align: center;
    color: #555;
    font-size: 11px;
    margin-bottom: 16px;
    letter-spacing: 1px;
  }
  svg { display: block; margin: 0 auto; }
  .legend {
    display: flex;
    gap: 24px;
    justify-content: center;
    font-size: 11px;
    color: #888;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 10px;
    align-items: center;
    font-size: 12px;
    flex-wrap: wrap;
  }
  .anim-controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    align-items: center;
    margin-bottom: 14px;
    font-size: 12px;
  }
  input[type=file] { color: #d4cfbf; font-family: inherit; font-size: 11px; }
  label { color: #888; }
  button {
    background: #1e1e2a;
    color: #d4cfbf;
    border: 1px solid #444;
    padding: 4px 14px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    cursor: pointer;
    border-radius: 3px;
  }
  button:hover { background: #2a2a3a; border-color: #c8b560; color: #c8b560; }
  #timeSlider { width: 300px; accent-color: #c8b560; }
  #timeDisplay { color: #c8b560; min-width: 80px; }
  #speedSelect {
    background: #1e1e2a; color: #d4cfbf; border: 1px solid #444;
    font-family: 'Courier New', monospace; font-size: 11px; padding: 2px 6px;
  }
</style>
</head>
<body>
<h2>Busy Period Tree Visualizer</h2>
<div class="subtitle">One-jump rank function · FCFS Tiebreaking</div>

<div class="controls">
  <label>Load simulation JSON:</label>
  <input type="file" id="fileInput" accept=".json">
  <label>Scale:</label>
  <input type="range" id="scaleSlider" min="40" max="300" value="100" style="width:100px">
  <span id="scaleVal">100px/unit</span>
</div>

<div class="anim-controls">
  <button id="btnRewind">⏮</button>
  <button id="btnPlay">▶ Play</button>
  <button id="btnPause">⏸ Pause</button>
  <input type="range" id="timeSlider" min="0" max="1000" value="0" step="1">
  <span id="timeDisplay">t = 0.00</span>
  <label>Speed:</label>
  <select id="speedSelect">
    <option value="0.5">0.5×</option>
    <option value="1" selected>1×</option>
    <option value="2">2×</option>
    <option value="5">5×</option>
    <option value="10">10×</option>
  </select>
</div>

<svg id="svg" width="1200" height="800"></svg>

<div class="legend">
  <span><span style="color:#333;border:1px solid #444;padding:0 4px">□</span> not yet arrived</span>
  <span><span style="color:#c0453a">■</span> A-chunk in system</span>
  <span><span style="color:#3a70c0">■</span> B-chunk in system</span>
  <span><span style="color:#555">■</span> completed</span>
  <span>numbers = service order &nbsp;|&nbsp; ticks = arrival relative to parent service</span>
</div>

<script>
const A_COLOR  = '#c0453a';
const B_COLOR  = '#3a70c0';
const GREY     = '#555';
const CLEAR_BG = '#1a1a24';
const BG_COLOR = '#0f0f14';
const TEXT_COLOR = '#fff';

const ROW_HEIGHT = 80;
const CHUNK_H    = 28;
const V_PAD      = 20;
const HORIZ_GAP  = 20;

let scale       = 100;
let simData     = null;
let animT       = 0;
let animMax     = 0;
let animRAF     = null;
let animPlaying = false;
let animLastTS  = null;
let animSpeed   = 1;
let layout      = null;

// ── Controls ──────────────────────────────────────────────────────────────────

document.getElementById('scaleSlider').addEventListener('input', function() {
  scale = parseInt(this.value);
  document.getElementById('scaleVal').textContent = scale + 'px/unit';
  if (simData) { buildLayout(simData); drawFrame(animT); }
});

document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    simData = JSON.parse(ev.target.result);
    stopAnim();
    animT = 0;
    animMax = simData.total_time;
    buildLayout(simData);
    drawFrame(0);
  };
  reader.readAsText(file);
});

document.getElementById('timeSlider').addEventListener('input', function() {
  if (!simData) return;
  stopAnim();
  animT = (parseInt(this.value) / 1000) * animMax;
  drawFrame(animT);
});

document.getElementById('btnPlay').addEventListener('click', () => { if (simData) startAnim(); });
document.getElementById('btnPause').addEventListener('click', stopAnim);
document.getElementById('btnRewind').addEventListener('click', () => {
  stopAnim(); animT = 0;
  document.getElementById('timeSlider').value = 0;
  if (simData) drawFrame(0);
});
document.getElementById('speedSelect').addEventListener('change', function() {
  animSpeed = parseFloat(this.value);
});

function startAnim() {
  if (animPlaying) return;
  if (animT >= animMax) animT = 0;
  animPlaying = true;
  animLastTS = null;
  animRAF = requestAnimationFrame(animStep);
}

function stopAnim() {
  animPlaying = false;
  if (animRAF) { cancelAnimationFrame(animRAF); animRAF = null; }
}

function animStep(ts) {
  if (!animPlaying) return;
  if (animLastTS !== null) {
    const wallDt = (ts - animLastTS) / 1000;
    // 1× speed: traverse full simulation in 10 wall-seconds
    animT += wallDt * animSpeed * (animMax / 10);
    if (animT >= animMax) { animT = animMax; stopAnim(); }
  }
  animLastTS = ts;
  drawFrame(animT);
  document.getElementById('timeSlider').value = Math.round((animT / animMax) * 1000);
  if (animPlaying) animRAF = requestAnimationFrame(animStep);
}

// ── Layout ────────────────────────────────────────────────────────────────────

function buildLayout(data) {
  const jobs   = data.jobs;
  const events = data.events;

  // Service order per chunk key "jobId_chunkType"
  const serviceOrder = {};
  events.forEach((ev, i) => {
    const key = `${ev.job_id}_${ev.chunk_type}`;
    if (!serviceOrder[key]) serviceOrder[key] = [];
    serviceOrder[key].push({ order: i + 1, start: ev.start_time, end: ev.end_time });
  });

  // Arrival times: root = 0; others = parent chunk start + time_into_chunk
  const jobArrival = {};
  Object.keys(jobs).forEach(id => { jobArrival[id] = Infinity; });
  jobArrival[0] = 0;

  Object.values(jobs).forEach(job => {
    const aSegs = serviceOrder[`${job.id}_A`] || [];
    const bSegs = serviceOrder[`${job.id}_B`] || [];
    const aStart = aSegs.length ? aSegs[0].start : null;
    const bStart = bSegs.length ? bSegs[0].start : null;

    job.children_during_a.forEach(c => {
      if (aStart !== null) jobArrival[c.id] = aStart + c.time_into_chunk;
    });
    job.children_during_b.forEach(c => {
      if (bStart !== null) jobArrival[c.id] = bStart + c.time_into_chunk;
    });
  });

  // Children map
  const childrenOf = {};
  Object.values(jobs).forEach(job => {
    childrenOf[job.id] = [];
    job.children_during_a.forEach(c => childrenOf[job.id].push({ childId: c.id, timeIntoChunk: c.time_into_chunk, chunkType: 'A' }));
    job.children_during_b.forEach(c => childrenOf[job.id].push({ childId: c.id, timeIntoChunk: c.time_into_chunk, chunkType: 'B' }));
  });

  // Depth
  const jobDepth = {};
  function assignDepth(id, d) {
    jobDepth[id] = d;
    (childrenOf[id] || []).forEach(c => assignDepth(c.childId, d + 1));
  }
  assignDepth(0, 0);

  // Subtree width
  function subtreeWidth(id) {
    const job = jobs[id];
    const nw = (job.a_size + job.b_size) * scale;
    const ch = childrenOf[id] || [];
    if (!ch.length) return nw;
    const cw = ch.reduce((s, c) => s + subtreeWidth(c.childId), 0) + (ch.length - 1) * HORIZ_GAP;
    return Math.max(nw, cw);
  }

  // X/Y positions
  const jobX = {}, jobY = {};
  function assignX(id, left) {
    const job = jobs[id];
    const nw = (job.a_size + job.b_size) * scale;
    const sw = subtreeWidth(id);
    jobX[id] = left + (sw - nw) / 2;
    jobY[id] = jobDepth[id] * ROW_HEIGHT + V_PAD;
    let cx = left;
    (childrenOf[id] || []).forEach(c => {
      const csw = subtreeWidth(c.childId);
      assignX(c.childId, cx);
      cx += csw + HORIZ_GAP;
    });
  }
  assignX(0, 20);

  const maxDepth = Math.max(...Object.values(jobDepth));
  const svgH = (maxDepth + 1) * ROW_HEIGHT + V_PAD + CHUNK_H + 40;
  const svgW = Math.max(1200, subtreeWidth(0) + 40);

  layout = { jobs, events, serviceOrder, childrenOf, jobX, jobY, jobArrival, svgW, svgH };
}

// ── Draw frame ────────────────────────────────────────────────────────────────

function drawFrame(t) {
  if (!layout) return;
  document.getElementById('timeDisplay').textContent = `t = ${t.toFixed(2)}`;

  const { jobs, serviceOrder, childrenOf, jobX, jobY, jobArrival, svgW, svgH } = layout;

  const svg = document.getElementById('svg');
  svg.setAttribute('width', svgW);
  svg.setAttribute('height', svgH);
  svg.innerHTML = '';

  svgEl('rect', { width: svgW, height: svgH, fill: BG_COLOR }, svg);

  // ── Edges ──
  Object.values(jobs).forEach(job => {
    (childrenOf[job.id] || []).forEach(c => {
      const childArrived = jobArrival[c.childId] <= t;
      const px = jobX[job.id], py = jobY[job.id];
      let ax;
      if (c.chunkType === 'A') {
        ax = px + c.timeIntoChunk * scale;
      } else {
        ax = px + jobs[job.id].a_size * scale + c.timeIntoChunk * scale;
      }
      const childJob = jobs[c.childId];
      const cnw = (childJob.a_size + childJob.b_size) * scale;
      const cx  = jobX[c.childId] + cnw / 2;
      const cy  = jobY[c.childId];
      const midY = (py + CHUNK_H + cy) / 2;

      svgEl('path', {
        d: `M ${ax} ${py + CHUNK_H} L ${ax} ${midY} L ${cx} ${midY} L ${cx} ${cy}`,
        stroke: childArrived ? '#666' : '#252530',
        'stroke-width': '1.5', fill: 'none'
      }, svg);

      // Tick on parent chunk
      svgEl('line', {
        x1: ax, y1: py, x2: ax, y2: py + CHUNK_H,
        stroke: childArrived ? '#bbb' : '#2a2a3a',
        'stroke-width': '1', 'stroke-dasharray': '2,2'
      }, svg);
    });
  });

  // ── Nodes ──
  Object.values(jobs).forEach(job => {
    const x  = jobX[job.id];
    const y  = jobY[job.id];
    const aW = job.a_size * scale;
    const bW = job.b_size * scale;
    const arrived = jobArrival[job.id] <= t;

    // ── A chunk ──
    const aSegs = serviceOrder[`${job.id}_A`] || [];

    if (!arrived) {
      svgEl('rect', { x, y, width: aW, height: CHUNK_H, fill: CLEAR_BG, stroke: '#2a2a3a', 'stroke-width': '1', rx: 2 }, svg);
    } else {
      // Red background
      svgEl('rect', { x, y, width: aW, height: CHUNK_H, fill: A_COLOR, stroke: '#222', 'stroke-width': '1', rx: 2 }, svg);
      // Grey fill proportional to work done
      let aDoneW = 0;
      aSegs.forEach(seg => {
        if (t >= seg.end)        aDoneW += (seg.end - seg.start) * scale;
        else if (t > seg.start)  aDoneW += (t - seg.start) * scale;
      });
      if (aDoneW > 0) {
        svgEl('rect', { x, y, width: Math.min(aDoneW, aW), height: CHUNK_H, fill: GREY, rx: 2 }, svg);
      }
      // Label
      if (aSegs.length > 0 && aW > 16) {
        svgEl('text', {
          x: x + aW / 2, y: y + CHUNK_H / 2 + 4,
          'text-anchor': 'middle', 'font-size': Math.min(11, aW / 2),
          fill: TEXT_COLOR, 'font-family': 'Courier New', 'font-weight': 'bold'
        }, svg, aSegs.map(s => s.order).join(','));
      }
    }

    // ── B chunk ──
    const bSegs = serviceOrder[`${job.id}_B`] || [];
    const totalBTime = bSegs.reduce((s, seg) => s + (seg.end - seg.start), 0);

    if (!arrived) {
      svgEl('rect', { x: x + aW, y, width: bW, height: CHUNK_H, fill: CLEAR_BG, stroke: '#2a2a3a', 'stroke-width': '1', rx: 2 }, svg);
    } else {
      // Blue background
      svgEl('rect', { x: x + aW, y, width: bW, height: CHUNK_H, fill: B_COLOR, stroke: '#222', 'stroke-width': '1', rx: 2 }, svg);
      // Grey fill
      let bDoneTime = 0;
      bSegs.forEach(seg => {
        if (t >= seg.end)       bDoneTime += (seg.end - seg.start);
        else if (t > seg.start) bDoneTime += (t - seg.start);
      });
      const bDoneW = totalBTime > 0 ? (bDoneTime / totalBTime) * bW : 0;
      if (bDoneW > 0) {
        svgEl('rect', { x: x + aW, y, width: Math.min(bDoneW, bW), height: CHUNK_H, fill: GREY, rx: 2 }, svg);
      }
      // Labels
      if (bSegs.length === 1 && bW > 16) {
        svgEl('text', {
          x: x + aW + bW / 2, y: y + CHUNK_H / 2 + 4,
          'text-anchor': 'middle', 'font-size': Math.min(11, bW / 2),
          fill: TEXT_COLOR, 'font-family': 'Courier New', 'font-weight': 'bold'
        }, svg, String(bSegs[0].order));
      } else if (bSegs.length > 1) {
        let cumTime = 0;
        bSegs.forEach(seg => {
          const segDur = seg.end - seg.start;
          const segX = x + aW + (cumTime / totalBTime) * bW;
          const segW = (segDur / totalBTime) * bW;
          if (segW > 14) {
            svgEl('text', {
              x: segX + segW / 2, y: y + CHUNK_H / 2 + 4,
              'text-anchor': 'middle', 'font-size': Math.min(11, segW / 2),
              fill: TEXT_COLOR, 'font-family': 'Courier New', 'font-weight': 'bold'
            }, svg, String(seg.order));
          }
          cumTime += segDur;
        });
      }
    }

    // Job label above
    svgEl('text', {
      x: x + (aW + bW) / 2, y: y - 5,
      'text-anchor': 'middle', 'font-size': '10',
      fill: arrived ? '#aaa' : '#333', 'font-family': 'Courier New'
    }, svg, `J${job.id}`);
  });
}

// ── SVG helper ────────────────────────────────────────────────────────────────

function svgEl(tag, attrs, parent, text) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  if (parent) parent.appendChild(e);
  return e;
}
</script>
</body>
</html>
